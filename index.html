<html>
<head>
<title>SPA VILA OLÍMPIA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin: 0; background: #000; text-align: center; }
img { max-width: 100%; height: auto; }
button { background: #ff69b4; color: white; border: none; padding: 5px 15px; margin: 10px; border-radius: 5px; cursor: pointer; font-size: 14px; }
</style>
</head>
<body>

<img src="images/index.png" width="100%">

<div style="background: #1a1a1a; padding: 20px; margin-top: 20px;">
    <img id="foto" src="images/foto1.jpeg" style="width: 90%; max-width: 350px; border-radius: 10px;">
    <br>
    <button onclick="voltar()">◀ Anterior</button>
    <button onclick="avancar()">Próximo ▶</button>
    <p style="color: #ff69b4;" id="contador">Foto 1 de 3</p>
</div>

<script>
let fotos = ["images/foto1.jpeg", "images/foto2.jpeg", "images/foto3.jpeg"];
let atual = 0;

function avancar() {
    atual = (atual + 1) % fotos.length;
    document.getElementById("foto").src = fotos[atual];
    document.getElementById("contador").innerHTML = "Foto " + (atual + 1) + " de " + fotos.length;
}

function voltar() {
    atual = (atual - 1 + fotos.length) % fotos.length;
    document.getElementById("foto").src = fotos[atual];
    document.getElementById("contador").innerHTML = "Foto " + (atual + 1) + " de " + fotos.length;
}
</script>

</body>
</html>
