<html>
<head>
<title>SPA VILA OLÍMPIA</title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        padding: 0;
        background: #000;
    }
    img {
        max-width: 100%;
        height: auto;
        display: block;
    }
    .container {
        max-width: 500px;
        margin: 0 auto;
        background: #000;
    }
    button {
        cursor: pointer;
        transition: 0.3s;
    }
    button:hover {
        opacity: 0.8;
        transform: scale(1.05);
    }
</style>
</head>
<body>

<div class="container">

    <!-- LAYOUT DO PHOTOSHOP -->
    <img src="images/index.png" width="100%" alt="">

    <!-- CARROSSEL -->
    <div style="text-align: center; background: #1a1a1a; padding: 20px; border-radius: 10px; margin: 20px 0;">
        
        <img id="fotoPrincipal" src="images/SPA1.jpeg" style="width: 90%; max-width: 350px; border-radius: 10px;">
        
        <div style="margin-top: 15px;">
            <button onclick="fotoAnterior()" style="background: #ff69b4; color: white; border: none; padding: 10px 25px; margin: 5px; border-radius: 5px; font-size: 16px;">◀ Anterior</button>
            <button onclick="proximaFoto()" style="background: #ff69b4; color: white; border: none; padding: 10px 25px; margin: 5px; border-radius: 5px; font-size: 16px;">Próximo ▶</button>
        </div>
        
        <div style="margin-top: 10px;">
            <span id="indicador" style="color: #ff69b4; font-size: 14px;">Foto 1 de 3</span>
        </div>
    </div>

</div>

<script>
    let galeria = [
        "images/SPA1.jpeg",
        "images/SPA2.jpeg",
        "images/SPA3.jpeg"
    ];
    let fotoAtual = 0;
    let totalFotos = galeria.length;

    function proximaFoto() {
        fotoAtual++;
        if (fotoAtual >= totalFotos) fotoAtual = 0;
        document.getElementById("fotoPrincipal").src = galeria[fotoAtual];
        document.getElementById("indicador").innerHTML = "Foto " + (fotoAtual + 1) + " de " + totalFotos;
    }

    function fotoAnterior() {
        fotoAtual--;
        if (fotoAtual < 0) fotoAtual = totalFotos - 1;
        document.getElementById("fotoPrincipal").src = galeria[fotoAtual];
        document.getElementById("indicador").innerHTML = "Foto " + (fotoAtual + 1) + " de " + totalFotos;
    }
</script>

</body>
</html>
